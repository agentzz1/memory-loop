<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Memory Loop">
<meta name="theme-color" content="#06060f">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Memory Loop 4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}

  :root {
    --primary: #00f0ff;
    --secondary: #ff00c8;
    --accent: #ffe600;
    --success: #00ff88;
    --danger: #ff2244;
    --bg: #06060f;
    --surface: rgba(255,255,255,0.03);
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
    --sal: env(safe-area-inset-left, 0px);
    --sar: env(safe-area-inset-right, 0px);
  }

  html, body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
    overscroll-behavior: none;
    -webkit-overflow-scrolling: touch;
  }

  canvas#bgCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .game-layer {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: var(--sat);
    padding-bottom: var(--sab);
    padding-left: var(--sal);
    padding-right: var(--sar);
  }

  /* HUD */
  .hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: calc(var(--sat) + 10px) 16px 10px;
    background: linear-gradient(180deg, rgba(6,6,15,0.97) 0%, rgba(6,6,15,0.8) 70%, transparent 100%);
  }

  .hud-left, .hud-right { display: flex; gap: 14px; align-items: center; }

  .hud-brand {
    position: fixed;
    top: calc(var(--sat) + 12px);
    left: 16px;
    z-index: 11;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.45rem;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.2);
    pointer-events: none;
  }

  .stat { text-align: center; }

  .stat-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.45rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #556;
    margin-bottom: 1px;
  }

  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.15rem;
    font-weight: 900;
  }

  .stat-value.score { color: var(--primary); text-shadow: 0 0 15px var(--primary); }
  .stat-value.combo { color: var(--accent); text-shadow: 0 0 15px var(--accent); }
  .stat-value.best { color: var(--secondary); text-shadow: 0 0 15px var(--secondary); }
  .stat-value.lives { color: var(--danger); text-shadow: 0 0 15px var(--danger); }

  .hud-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 3px;
  }

  /* Ring Container */
  .ring-container {
    position: relative;
    width: min(92vw, 420px);
    height: min(92vw, 420px);
  }

  @media(orientation: landscape) and (max-height: 500px){
    .ring-container { width: min(60vh, 380px); height: min(60vh, 380px); }
  }

  .ring-svg {
    width: 100%;
    height: 100%;
  }

  /* Center Info */
  .center-info {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }

  .center-msg {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: #667;
    margin-bottom: 4px;
    min-height: 18px;
  }

  .center-big {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Mode Buttons */
  .mode-bar {
    position: fixed;
    bottom: calc(var(--sab) + 12px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
  }

  .mode-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 1.5px;
    padding: 10px 16px;
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: #889;
    cursor: pointer;
    transition: all 0.25s;
    text-transform: uppercase;
    min-height: 44px;
    min-width: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mode-btn:active { transform: scale(0.95); }
  .mode-btn:hover, .mode-btn:focus { border-color: var(--primary); color: var(--primary); outline: none; }
  .mode-btn.active { background: rgba(0,240,255,0.1); border-color: var(--primary); color: var(--primary); box-shadow: 0 0 20px rgba(0,240,255,0.15); }

  /* Power-ups */
  .powerup-bar {
    position: fixed;
    bottom: calc(var(--sab) + 60px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 14px;
    z-index: 10;
  }

  .powerup {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: #889;
    font-size: 1.3rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }

  .powerup:active:not(.disabled) { transform: scale(0.9); }
  .powerup:hover:not(.disabled), .powerup:focus:not(.disabled) { border-color: var(--accent); color: var(--accent); transform: scale(1.08); outline: none; }
  .powerup.disabled { opacity: 0.25; cursor: default; pointer-events: none; }
  .powerup .count {
    position: absolute;
    top: -4px; right: -4px;
    background: var(--danger);
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.55rem;
    font-weight: 700;
    min-width: 18px; height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 8px rgba(255,34,68,0.5);
  }

  /* Overlay */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(6,6,15,0.94);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
    padding: var(--sat) var(--sar) var(--sab) var(--sal);
  }

  .overlay.active { opacity: 1; pointer-events: all; }

  .modal {
    text-align: center;
    max-width: 380px;
    width: 90%;
    transform: scale(0.9) translateY(20px);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .overlay.active .modal { transform: scale(1) translateY(0); }

  .modal h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  .modal .final-score {
    font-family: 'Orbitron', sans-serif;
    font-size: 3.5rem;
    font-weight: 900;
    color: var(--primary);
    text-shadow: 0 0 40px var(--primary);
    margin: 14px 0;
  }

  .modal .stats-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 24px;
  }

  .modal p { color: #667; margin-bottom: 24px; font-size: 0.95rem; line-height: 1.4; }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 2px;
    padding: 14px 36px;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.25s;
    text-transform: uppercase;
    margin: 6px;
    min-height: 48px;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: linear-gradient(135deg, var(--primary), #0080ff);
    color: #000;
    font-weight: 700;
    box-shadow: 0 4px 30px rgba(0,240,255,0.3);
  }
  .btn-primary:hover, .btn-primary:focus { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(0,240,255,0.4); outline: none; }

  .btn-ghost {
    background: transparent;
    color: #889;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .btn-ghost:hover, .btn-ghost:focus { border-color: var(--primary); color: var(--primary); outline: none; }

  /* Sequence bar */
  .seq-bar {
    position: fixed;
    top: calc(var(--sat) + 52px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    z-index: 10;
    max-width: 85vw;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 8px 14px;
    background: rgba(6,6,15,0.7);
    border-radius: 20px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .seq-bar::-webkit-scrollbar { display: none; }

  .seq-item {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    flex-shrink: 0;
    transition: all 0.3s;
  }

  .seq-item.waiting { opacity: 0.4 !important; }
  .seq-item.current { box-shadow: 0 0 8px var(--accent); animation: seqPulse 0.8s infinite; }
  .seq-item.done { filter: brightness(2) saturate(0.5); }

  @keyframes seqPulse {
    0%,100% { transform: scale(1); box-shadow: 0 0 6px var(--accent); }
    50% { transform: scale(1.6); box-shadow: 0 0 12px var(--accent); }
  }

  /* Achievement popup */
  .achievement {
    position: fixed;
    top: calc(var(--sat) + 90px);
    left: 50%;
    transform: translateX(-50%) translateY(-30px);
    background: rgba(255,230,0,0.08);
    border: 1px solid var(--accent);
    padding: 10px 22px;
    border-radius: 12px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--accent);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: all 0.4s;
    text-shadow: 0 0 10px var(--accent);
    white-space: nowrap;
  }

  .achievement.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Floating score */
  .float-score {
    position: fixed;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1.2rem;
    pointer-events: none;
    z-index: 50;
    animation: floatUp 0.8s ease-out forwards;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-50px) scale(0.7); }
  }

  /* Difficulty ramp indicator */
  .difficulty-bar {
    position: fixed;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 4px;
    height: 160px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    z-index: 10;
  }

  .difficulty-fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    border-radius: 2px;
    transition: all 0.5s;
    background: linear-gradient(0deg, var(--success), var(--accent), var(--danger));
  }

  .difficulty-label {
    position: fixed;
    left: 8px;
    top: calc(50% + 95px);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.45rem;
    letter-spacing: 2px;
    color: #445;
    z-index: 10;
  }

  /* Haptic feedback visual */
  @keyframes hapticFlash {
    0% { box-shadow: 0 0 0 0 rgba(0,240,255,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(0,240,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,240,255,0); }
  }

  /* Small screens */
  @media(max-width:380px){
    .stat-value { font-size: 1rem; }
    .hud-title { font-size: 0.55rem; letter-spacing: 2px; }
    .mode-btn { font-size: 0.5rem; padding: 8px 12px; }
    .center-big { font-size: 1.6rem; }
    .powerup { width: 46px; height: 46px; font-size: 1.1rem; }
  }

  @media(max-height:700px){
    .ring-container { width: min(72vw, 300px); height: min(72vw, 300px); }
    .powerup-bar { bottom: calc(var(--sab) + 52px); }
    .mode-bar { bottom: calc(var(--sab) + 8px); }
  }

  /* Landscape phones */
  @media(orientation: landscape) and (max-height:500px){
    .hud { padding: calc(var(--sat) + 4px) 12px 4px; }
    .stat-value { font-size: 0.9rem; }
    .stat-label { font-size: 0.4rem; }
    .hud-title { display: none; }
    .seq-bar { top: calc(var(--sat) + 36px); }
    .achievement { top: calc(var(--sat) + 60px); }
    .center-big { font-size: 1.4rem; }
    .center-msg { font-size: 0.6rem; }
    .powerup-bar { bottom: calc(var(--sab) + 48px); gap: 10px; }
    .mode-bar { bottom: calc(var(--sab) + 4px); gap: 6px; }
    .mode-btn { padding: 8px 12px; font-size: 0.5rem; min-height: 36px; }
    .powerup { width: 40px; height: 40px; font-size: 1rem; }
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- HUD -->
<div class="hud-brand">MADE BY AGENT ZZ GAMES</div>
<div class="hud">
  <div class="hud-left">
    <div class="stat">
      <div class="stat-label">Score</div>
      <div class="stat-value score" id="scoreVal">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Combo</div>
      <div class="stat-value combo" id="comboVal">x1</div>
    </div>
  </div>
  <div class="hud-title" id="hudLevel">L1 · 1</div>
  <div class="hud-right">
    <div class="stat">
      <div class="stat-label">Lives</div>
      <div class="stat-value lives" id="livesVal">♥♥♥</div>
    </div>
    <div class="stat">
      <div class="stat-label">Best</div>
      <div class="stat-value best" id="bestVal">0</div>
    </div>
  </div>
</div>

<!-- Sequence -->
<div class="seq-bar" id="seqBar"></div>

<!-- Achievement -->
<div class="achievement" id="achievement"></div>

<!-- Difficulty -->
<div class="difficulty-bar"><div class="difficulty-fill" id="diffFill" style="height:0%"></div></div>
<div class="difficulty-label">DIFF</div>

<!-- Game Area -->
<div class="game-layer">
  <div class="ring-container">
    <svg class="ring-svg" id="ringSvg" viewBox="0 0 420 420"></svg>
    <div class="center-info">
      <div class="center-msg" id="centerMsg">BEREIT</div>
      <div class="center-big" id="centerBig">&#9654;</div>
    </div>
  </div>
</div>

<!-- Power-ups -->
<div class="powerup-bar">
  <button class="powerup" id="puReveal" onclick="usePowerup('reveal')" title="Sequenz nochmal zeigen">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    <span class="count" id="puRevealCount">2</span>
  </button>
  <button class="powerup" id="puShield" onclick="usePowerup('shield')" title="1 Fehler schützen">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    <span class="count" id="puShieldCount">1</span>
  </button>
  <button class="powerup" id="puSlow" onclick="usePowerup('slow')" title="Zeit verlangsamen">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span class="count" id="puSlowCount">1</span>
  </button>
</div>

<!-- Modes -->
<div class="mode-bar">
  <button class="mode-btn active" data-mode="classic" onclick="setMode('classic')">Classic</button>
  <button class="mode-btn" data-mode="speed" onclick="setMode('speed')">Speed</button>
  <button class="mode-btn" data-mode="chaos" onclick="setMode('chaos')">Chaos</button>
  <button class="mode-btn" data-mode="zen" onclick="setMode('zen')">Zen</button>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">MEMORY LOOP</h2>
    <div class="final-score" id="modalScore">0</div>
    <div class="stats-row">
      <div class="stat"><div class="stat-label">Best Combo</div><div class="stat-value combo" id="modalCombo">x1</div></div>
      <div class="stat"><div class="stat-label">Level</div><div class="stat-value score" id="modalLevel">0</div></div>
    </div>
    <p id="modalMsg">Merke die Sequenz und tippe sie ab.<br>Jeder Level schaltet einen neuen Ring frei.</p>
    <button class="btn btn-primary" onclick="startGame()">Start</button>
    <button class="btn btn-ghost" onclick="closeOverlay()" id="closeBtn" style="display:none">Schließen</button>
  </div>
</div>

<script>
// ============ AUDIO ENGINE ============
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx;
function ensureAudio() { if (!actx) actx = new AudioCtx(); }

const NOTES_INNER  = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
const NOTES_MIDDLE = [392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 698.46, 783.99];
const NOTES_OUTER  = [523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50];
const RING_NOTES = [NOTES_INNER, NOTES_MIDDLE, NOTES_OUTER];
const SUCCESS_NOTES = [523.25, 659.25, 783.99];

function playTone(freq, dur = 0.15, type = 'sine', vol = 0.12) {
  ensureAudio();
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  o.connect(g);
  g.connect(actx.destination);
  o.start();
  o.stop(actx.currentTime + dur);
}

function playNodeSound(ring, node) {
  playTone(RING_NOTES[ring][node % 8], 0.2, 'triangle', 0.15);
}
function playSuccessSound(i) {
  if (i < SUCCESS_NOTES.length) playTone(SUCCESS_NOTES[i], 0.3, 'sine', 0.1);
}
function playErrorSound() {
  playTone(150, 0.4, 'sawtooth', 0.08);
  playTone(120, 0.5, 'sawtooth', 0.06);
}
function playComboSound(c) {
  playTone(400 + c * 50, 0.15, 'square', 0.06);
}

function haptic(style = 'light') {
  if (navigator.vibrate) {
    if (style === 'light') navigator.vibrate(10);
    else if (style === 'medium') navigator.vibrate(25);
    else if (style === 'heavy') navigator.vibrate([30, 10, 30]);
    else if (style === 'success') navigator.vibrate([10, 30, 10]);
    else if (style === 'error') navigator.vibrate([50, 20, 50, 20, 50]);
  }
}

// ============ BACKGROUND CANVAS ============
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H;
const particles = [];

function resizeCanvas() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.r = Math.random() * 1.5 + 0.5;
    this.alpha = Math.random() * 0.4 + 0.1;
    this.color = ['#00f0ff', '#ff00c8', '#ffe600', '#00ff88'][Math.floor(Math.random() * 4)];
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

for (let i = 0; i < 60; i++) particles.push(new Particle());

let bgTime = 0;
function drawBg() {
  ctx.fillStyle = '#06060f';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.015)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  const grd = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, 250);
  grd.addColorStop(0, `rgba(0,240,255,${0.03 + Math.sin(bgTime) * 0.01})`);
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
  particles.forEach(p => { p.update(); p.draw(); });
  bgTime += 0.02;
  requestAnimationFrame(drawBg);
}
drawBg();

// ============ GAME STATE ============
const RING_COUNT = 3;
const NODES_PER_RING = 8;
const RING_RADII = [90, 150, 200];
const RING_SIZES = [18, 15, 12];
const RING_HIT = [26, 22, 18];
const CX = 210, CY = 210;

const RING_COLORS = [
  ['#00f0ff','#ff00c8','#ffe600','#00ff88','#ff4466','#aa44ff','#ff8800','#44ffcc'],
  ['#00ddff','#ee00bb','#eecc00','#00dd77','#dd3355','#9933ee','#ee7700','#33ddbb'],
  ['#00aacc','#bb0099','#ccaa00','#00aa55','#aa2244','#7722cc','#cc5500','#22aa99']
];

let sequence = [];
let playerPos = 0;
let score = 0;
let combo = 1;
let bestCombo = 1;
let bestScore = parseInt(localStorage.getItem('ml4_best') || '0');
let lives = 3;
let level = 0;
let playing = false;
let showing = false;
let gameMode = 'classic';
let shieldActive = false;
let slowActive = false;
let powerups = { reveal: 2, shield: 1, slow: 1 };

document.getElementById('bestVal').textContent = bestScore;

// ============ SVG RING ============
const svg = document.getElementById('ringSvg');
let nodeEls = [];

function nodeId(ring, node) { return ring * NODES_PER_RING + node; }

function buildRing() {
  svg.innerHTML = '';
  nodeEls = [];

  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  defs.innerHTML = `
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowBig"><feGaussianBlur stdDeviation="10" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
  svg.appendChild(defs);

  for (let r = 0; r < RING_COUNT; r++) {
    const track = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    track.setAttribute('cx', CX);
    track.setAttribute('cy', CY);
    track.setAttribute('r', RING_RADII[r]);
    track.setAttribute('fill', 'none');
    track.setAttribute('stroke', RING_COLORS[r][0]);
    track.setAttribute('stroke-opacity', r === 0 ? '0.15' : '0.06');
    track.setAttribute('stroke-width', '1.5');
    track.setAttribute('stroke-dasharray', r === 0 ? '10 4' : '6 8');
    track.id = 'ringTrack' + r;
    svg.appendChild(track);

    for (let n = 0; n < NODES_PER_RING; n++) {
      const angle = (n / NODES_PER_RING) * Math.PI * 2 - Math.PI / 2;
      const x = CX + Math.cos(angle) * RING_RADII[r];
      const y = CY + Math.sin(angle) * RING_RADII[r];
      const color = RING_COLORS[r][n];
      const sz = RING_SIZES[r];
      const hitSz = RING_HIT[r];

      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('transform', `translate(${x},${y})`);
      g.setAttribute('data-ring', r);
      g.setAttribute('data-node', n);
      g.style.cursor = 'pointer';
      g.style.transition = 'opacity 0.5s';

      const hit = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      hit.setAttribute('r', hitSz);
      hit.setAttribute('fill', 'transparent');
      g.appendChild(hit);

      const glow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      glow.setAttribute('r', sz + 10);
      glow.setAttribute('fill', color);
      glow.setAttribute('opacity', '0');
      glow.setAttribute('filter', 'url(#glowBig)');
      g.appendChild(glow);

      const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circ.setAttribute('r', sz);
      circ.setAttribute('fill', 'rgba(255,255,255,0.04)');
      circ.setAttribute('stroke', color);
      circ.setAttribute('stroke-width', r === 0 ? '2.5' : '2');
      circ.setAttribute('opacity', r === 0 ? '0.6' : '0.15');
      g.appendChild(circ);

      const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      dot.setAttribute('r', sz * 0.35);
      dot.setAttribute('fill', color);
      dot.setAttribute('opacity', r === 0 ? '0.3' : '0.08');
      g.appendChild(dot);

      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dy', '4');
      text.setAttribute('fill', color);
      text.setAttribute('font-family', 'Orbitron, sans-serif');
      text.setAttribute('font-size', r === 0 ? '10' : '8');
      text.setAttribute('font-weight', '700');
      text.setAttribute('opacity', r === 0 ? '0.7' : '0.15');
      text.textContent = n + 1;
      g.appendChild(text);

      g.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        onNodeClick(r, n);
      });

      svg.appendChild(g);
      nodeEls.push({ g, glow, circ, dot, color, ring: r, node: n });
    }
  }

  // Ring labels
  const labels = ['I', 'II', 'III'];
  for (let r = 0; r < RING_COUNT; r++) {
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', CX);
    label.setAttribute('y', CY - RING_RADII[r] - 12);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('fill', RING_COLORS[r][0]);
    label.setAttribute('font-family', 'Orbitron, sans-serif');
    label.setAttribute('font-size', '9');
    label.setAttribute('font-weight', '700');
    label.setAttribute('opacity', r === 0 ? '0.25' : '0.08');
    label.id = 'ringLabel' + r;
    label.textContent = labels[r];
    svg.appendChild(label);
  }
}

function lightNode(ring, node, duration = 300) {
  const idx = nodeId(ring, node);
  const n = nodeEls[idx];
  n.glow.setAttribute('opacity', '0.4');
  n.circ.setAttribute('opacity', '1');
  n.circ.setAttribute('stroke-width', '3.5');
  n.dot.setAttribute('opacity', '1');
  const base = n.g.getAttribute('transform');
  if (!base.includes('scale')) n.g.setAttribute('transform', base + ' scale(1.2)');

  setTimeout(() => {
    n.glow.setAttribute('opacity', '0');
    n.circ.setAttribute('opacity', '0.6');
    n.circ.setAttribute('stroke-width', ring === 0 ? '2.5' : '2');
    n.dot.setAttribute('opacity', '0.3');
    const b = n.g.getAttribute('transform');
    n.g.setAttribute('transform', b.replace(/ scale\([^)]*\)/, ''));
  }, duration);
}

function flashCorrect(ring, node) {
  const n = nodeEls[nodeId(ring, node)];
  n.glow.setAttribute('opacity', '0.5');
  n.glow.setAttribute('fill', '#00ff88');
  n.dot.setAttribute('fill', '#00ff88');
  setTimeout(() => {
    n.glow.setAttribute('opacity', '0');
    n.glow.setAttribute('fill', n.color);
    n.dot.setAttribute('fill', n.color);
  }, 400);
}

function flashWrong(ring, node) {
  const n = nodeEls[nodeId(ring, node)];
  n.glow.setAttribute('opacity', '0.6');
  n.glow.setAttribute('fill', '#ff2244');
  n.circ.setAttribute('stroke', '#ff2244');
  setTimeout(() => {
    n.glow.setAttribute('opacity', '0');
    n.glow.setAttribute('fill', n.color);
    n.circ.setAttribute('stroke', n.color);
  }, 500);
}

buildRing();
unlockRing(0);

// ============ UI UPDATES ============
function updateHUD() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('comboVal').textContent = 'x' + combo;
  document.getElementById('bestVal').textContent = bestScore;
  let hearts = '';
  for (let i = 0; i < lives; i++) hearts += '♥';
  document.getElementById('livesVal').textContent = hearts || '—';
  document.getElementById('diffFill').style.height = Math.min(level * 4, 100) + '%';

  const rings = Math.min(level, 3);
  document.getElementById('hudLevel').textContent = 'L' + level + ' · R' + rings + ' · ' + sequence.length;

  document.getElementById('puRevealCount').textContent = powerups.reveal;
  document.getElementById('puShieldCount').textContent = powerups.shield;
  document.getElementById('puSlowCount').textContent = powerups.slow;

  document.getElementById('puReveal').classList.toggle('disabled', powerups.reveal <= 0 || !playing);
  document.getElementById('puShield').classList.toggle('disabled', powerups.shield <= 0 || shieldActive);
  document.getElementById('puSlow').classList.toggle('disabled', powerups.slow <= 0 || slowActive);
}

function updateSeqBar() {
  const bar = document.getElementById('seqBar');
  bar.innerHTML = '';

  for (let i = 0; i < sequence.length; i++) {
    const dot = document.createElement('div');
    dot.className = 'seq-item';
    dot.style.background = RING_COLORS[sequence[i].ring][0];

    if (showing) {
      dot.classList.add('waiting');
    } else if (i < playerPos) {
      dot.classList.add('done');
    } else if (i === playerPos) {
      dot.classList.add('current');
    } else {
      dot.style.opacity = '0.35';
    }
    bar.appendChild(dot);
  }

  const current = bar.querySelector('.current');
  if (current) current.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function setCenter(msg, big) {
  document.getElementById('centerMsg').textContent = msg;
  document.getElementById('centerBig').textContent = big;
}

function floatScore(x, y, text, color) {
  const el = document.createElement('div');
  el.className = 'float-score';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.color = color;
  el.style.textShadow = `0 0 20px ${color}`;
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function showAchievement(text) {
  const el = document.getElementById('achievement');
  el.textContent = '★ ' + text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ============ GAME LOGIC ============
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function getSpeed() {
  const base = slowActive ? 1400 : 700;
  if (gameMode === 'speed') return Math.max(250, base - level * 40);
  if (gameMode === 'zen') return base + 200;
  return Math.max(300, base - level * 25);
}

function getPause() {
  return gameMode === 'speed' ? 80 : 150;
}

function addToSequence() {
  let maxRing = Math.min(level - 1, 2);
  updateRingVisibility(maxRing);

  let ring, node;
  if (gameMode === 'chaos' && level > 3 && Math.random() < 0.3) {
    const last = sequence[sequence.length - 1];
    ring = last.ring;
    node = (last.node + 3) % NODES_PER_RING;
  } else {
    ring = Math.floor(Math.random() * (maxRing + 1));
    node = Math.floor(Math.random() * NODES_PER_RING);
  }
  sequence.push({ ring, node });
}

function updateRingVisibility(maxRing) {
  for (let r = 0; r <= maxRing; r++) {
    unlockRing(r);
  }
}

function unlockRing(r) {
  const track = document.getElementById('ringTrack' + r);
  if (track) track.setAttribute('stroke-opacity', '0.15');

  const label = document.getElementById('ringLabel' + r);
  if (label) label.setAttribute('opacity', '0.25');

  for (let n = 0; n < NODES_PER_RING; n++) {
    const el = nodeEls[nodeId(r, n)];
    el.circ.setAttribute('opacity', '0.6');
    el.dot.setAttribute('opacity', '0.3');
    el.g.querySelector('text').setAttribute('opacity', '0.7');
  }
}

async function showSequence() {
  showing = true;
  setCenter('MERKEN', sequence.length);
  updateSeqBar();

  await sleep(600);

  for (let i = 0; i < sequence.length; i++) {
    const { ring, node } = sequence[i];
    lightNode(ring, node, getSpeed() - 50);
    playNodeSound(ring, node);
    updateSeqBar();
    await sleep(getSpeed());
    if (getPause() > 0) await sleep(getPause());
  }

  showing = false;
  playerPos = 0;
  setCenter('DEIN ZUG', '●');
  updateSeqBar();
}

function nextRound() {
  level++;
  addToSequence();
  updateHUD();
  showSequence();
}

function onNodeClick(ring, node) {
  if (!playing || showing) return;
  ensureAudio();

  const expected = sequence[playerPos];
  const ringMultiplier = ring + 1;

  if (ring === expected.ring && node === expected.node) {
    playNodeSound(ring, node);
    flashCorrect(ring, node);
    haptic('light');

    const levelBonus = 1 + level * 0.1;
    const speedBonus = gameMode === 'speed' ? 2 : 1;
    const pts = Math.round(10 * ringMultiplier * combo * levelBonus * speedBonus);
    score += pts;
    if (combo < 20) combo++;
    if (combo > bestCombo) bestCombo = combo;

    const angle = (node / NODES_PER_RING) * Math.PI * 2 - Math.PI / 2;
    const rect = svg.getBoundingClientRect();
    const nx = rect.left + (CX + Math.cos(angle) * RING_RADII[ring]) * (rect.width / 420);
    const ny = rect.top + (CY + Math.sin(angle) * RING_RADII[ring]) * (rect.height / 420);
    floatScore(nx, ny, '+' + pts + (ringMultiplier > 1 ? ' x' + ringMultiplier : ''), nodeEls[nodeId(ring, node)].color);

    if (combo % 5 === 0) {
      playComboSound(combo);
      haptic('success');
      showAchievement(combo + 'x COMBO!');
    }

    playerPos++;
    updateHUD();
    updateSeqBar();

    if (playerPos === sequence.length) {
      playSuccessSound(0);
      haptic('success');
      setCenter('LEVEL ' + level, '✓');
      playing = false;

      if (level % 5 === 0 && lives < 5) lives++;
      if (level % 7 === 0) powerups.reveal = Math.min(powerups.reveal + 1, 3);
      if (level % 10 === 0) powerups.shield = Math.min(powerups.shield + 1, 2);

      updateHUD();

      setTimeout(() => {
        playing = true;
        nextRound();
      }, 1000);
    }
  } else {
    playErrorSound();
    flashWrong(ring, node);
    haptic('error');

    if (shieldActive) {
      shieldActive = false;
      showAchievement('SCHILD AKTIVIERT!');
      playTone(800, 0.2, 'sine', 0.1);
      updateHUD();
      return;
    }

    combo = 1;
    lives--;
    updateHUD();

    if (lives <= 0 || gameMode === 'zen') {
      if (gameMode === 'zen') {
        combo = 1;
        playerPos = 0;
        updateHUD();
        updateSeqBar();
        return;
      }
      playing = false;
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('ml4_best', bestScore);
      }
      showGameOver();
    } else {
      playerPos = 0;
      updateSeqBar();
      setCenter('FALSCH!', '✗');
      setTimeout(() => showSequence(), 1200);
    }
  }
}

function showGameOver() {
  updateHUD();
  document.getElementById('modalTitle').textContent = 'GAME OVER';
  document.getElementById('modalScore').textContent = score;
  document.getElementById('modalCombo').textContent = 'x' + bestCombo;
  document.getElementById('modalLevel').textContent = level;
  const msgs = [
    'Guter Start!', 'Nicht schlecht!', 'Stark!', 'Beeindruckend!',
    'Absoluter Champion!', 'Legende!', 'Göttlich!'
  ];
  document.getElementById('modalMsg').textContent = msgs[Math.min(Math.floor(level / 3), msgs.length - 1)];
  document.getElementById('closeBtn').style.display = 'inline-block';
  document.getElementById('overlay').classList.add('active');
}

// ============ POWERUPS ============
function usePowerup(type) {
  if (!playing || showing) return;
  ensureAudio();
  haptic('medium');

  if (type === 'reveal' && powerups.reveal > 0) {
    powerups.reveal--;
    playTone(600, 0.3, 'sine', 0.1);
    showAchievement('VISION!');
    playerPos = 0;
    showSequence();
    updateHUD();
  }

  if (type === 'shield' && powerups.shield > 0 && !shieldActive) {
    powerups.shield--;
    shieldActive = true;
    playTone(500, 0.4, 'triangle', 0.1);
    showAchievement('SCHILD AKTIV!');
    updateHUD();
  }

  if (type === 'slow' && powerups.slow > 0 && !slowActive) {
    powerups.slow--;
    slowActive = true;
    playTone(300, 0.5, 'sine', 0.08);
    showAchievement('ZEIT LANGSAMER!');
    updateHUD();
    setTimeout(() => { slowActive = false; updateHUD(); }, 15000);
  }
}

// ============ MODES ============
function setMode(mode) {
  gameMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
}

// ============ START / RESET ============
function startGame() {
  closeOverlay();
  sequence = [];
  playerPos = 0;
  score = 0;
  combo = 1;
  bestCombo = 1;
  lives = gameMode === 'zen' ? 999 : 3;
  level = 0;
  playing = true;
  shieldActive = false;
  slowActive = false;
  powerups = { reveal: 2, shield: 1, slow: 1 };
  // Reset ring visuals
  buildRing();
  unlockRing(0);
  updateHUD();
  nextRound();
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
}

// Prevent scroll on touch
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Init
updateHUD();
document.getElementById('overlay').classList.add('active');
</script>
